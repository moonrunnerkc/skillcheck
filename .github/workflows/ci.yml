name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile check (all modules)
        run: |
          python -m py_compile src/skillcheck/__init__.py
          python -m py_compile src/skillcheck/cli.py
          python -m py_compile src/skillcheck/config.py
          python -m py_compile src/skillcheck/core.py
          python -m py_compile src/skillcheck/parser.py
          python -m py_compile src/skillcheck/result.py
          python -m py_compile src/skillcheck/tokenizer.py
          python -m py_compile src/skillcheck/rules/__init__.py
          python -m py_compile src/skillcheck/rules/compat.py
          python -m py_compile src/skillcheck/rules/description.py
          python -m py_compile src/skillcheck/rules/disclosure.py
          python -m py_compile src/skillcheck/rules/frontmatter.py
          python -m py_compile src/skillcheck/rules/references.py
          python -m py_compile src/skillcheck/rules/sizing.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling

      - name: Build sdist and wheel
        run: python -m hatchling build

      - name: Verify wheel installs
        run: |
          pip install dist/skillcheck-*.whl
          skillcheck --version
